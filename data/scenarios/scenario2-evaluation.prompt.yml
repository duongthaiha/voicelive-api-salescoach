name: NFU Mutual Home Insurance Complaint Evaluation
description: Evaluate complaint handling and customer retention skills for home insurance claim escalation
model: gpt-4o
modelParameters:
  temperature: 0.3
  max_tokens: 1500
messages:
  - role: system
    content: |
      You are an expert insurance complaint handling evaluator specialising in UK personal lines insurance and FCA Consumer Duty requirements. Evaluate the provided conversation between an NFU Mutual adviser and a frustrated home insurance customer.

      EVALUATION CRITERIA:

      **SPEAKING TONE & STYLE (30 points):**
      1. Empathy & Active Listening (10 pts) - Genuine empathy, acknowledges the customer's frustration and emotional state without being dismissive
      2. De-escalation Skill (10 pts) - Calmly takes ownership, avoids defensive language, doesn't blame other departments
      3. Professional Composure (10 pts) - Maintains patience and warmth even when the customer is upset or interrupts

      **CONVERSATION CONTENT QUALITY (70 points):**
      1. Complaint Understanding & Acknowledgement (25 pts) - Identifies all key issues, summarises the complaint back to the customer, validates their experience
      2. Resolution & Action Plan (25 pts) - Offers concrete next steps with specific timelines, addresses reimbursement question, takes personal ownership of follow-up
      3. Retention & Relationship Recovery (20 pts) - References the customer's loyalty, expresses genuine care about keeping the relationship, doesn't just offer hollow apologies

      Focus on FCA Consumer Duty principles: acting to deliver good outcomes, treating customers fairly, and providing timely communication.
  - role: user
    content: |
      Evaluate this conversation:
      {{conversation_transcript}}
testData:
  - conversation_transcript: |
      NFU Mutual Adviser: Good afternoon, thank you for calling NFU Mutual. My name is David, how can I help you today?
      Helen: David, I've been a customer for 12 years and frankly I'm at my wits' end. My roof was damaged in the storm three weeks ago and I've barely heard a word since I reported the claim.
      NFU Mutual Adviser: I'm really sorry to hear you've been left without updates, Mrs Marsh. That's not the service we aim to provide, especially for a valued long-standing customer like yourself. Can you tell me your claim reference so I can look into exactly where things stand?
      Helen: It's HM-2026-4451. I've got buckets in the bedroom and I paid £800 out of my own pocket for emergency tarping. Will I even get that back?
      NFU Mutual Adviser: I completely understand how stressful this must be. Let me pull up your claim now. While I'm doing that, I want to reassure you that emergency repair costs like the tarping are typically covered under your policy, so we should be able to reimburse that.
    expected: "Should evaluate empathy, complaint handling skill, and the adviser's ability to rebuild trust with specific actions"
evaluators:
  - name: Empathy and de-escalation assessment
    description: Evaluates genuine emotional intelligence in handling a frustrated loyal customer
  - name: Resolution quality evaluation
    description: Assesses whether concrete actions and timelines are provided
  - name: Retention and relationship recovery
    description: Considers how well the adviser addresses the customer's loyalty and potential to switch
