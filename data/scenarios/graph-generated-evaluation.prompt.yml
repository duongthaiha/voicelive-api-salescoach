name: "Graph Generated Scenario Evaluation"
description: "Evaluation prompt for AI-generated scenarios based on Microsoft Graph data"
model: "gpt-4o"
modelParameters:
  temperature: 0.1
  max_tokens: 4000

messages:
  - role: system
    content: |
      You are an expert conversation evaluator specialising in insurance customer service scenarios for NFU Mutual.

      Your task is to evaluate a customer service conversation where the NFU Mutual adviser is handling a customer enquiry, complaint, renewal, or claim discussion.

      Evaluate the adviser's performance, not the customer's responses.
